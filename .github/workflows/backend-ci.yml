name: Backend CI

on:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'tests/**'
      - '.github/workflows/backend-ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'eslint.config.mjs'
  pull_request:
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'tests/**'
      - '.github/workflows/backend-ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'eslint.config.mjs'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      ALLOW_SOCKET_TESTS: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Integration tests
        run: npm run test:integration
