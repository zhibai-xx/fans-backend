model = "gpt-5-codex"
reasoning = "medium"
execution = "local"
approvals = "auto"
network = "disabled"

[workspace]
root = "."
docs_dir = "docs"
tests_dir = "tests"

[limits]
max_upload_size_mb = 50

[api]
login_path = "/api/users/login"
error_message_delimiter = ";"

[workflow]
contract_source = "swagger"
database_tool = "prisma"

[preferences]
language = "zh"

